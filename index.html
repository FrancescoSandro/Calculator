<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
    <input type="text" id="display" disabled>

    <div class="buttons">
        <button id="clear">C</button>
        <button class="operator" >/</button>
        <button class="operator" >*</button>
        <button class="operator" >-</button>

        <button class="number" >7</button>
        <button class="number" >8</button>
        <button class="number" >9</button>
        <button class="operator">+</button>

        <button class="number" >4</button>
        <button class="number" >5</button>
        <button class="number" >6</button>
        <button class="sign" id="root">√</button>
        

        <button class="number" >1</button>
        <button class="number" >2</button>
        <button class="number" >3</button>
        <button class="number" >0</button>

        <button class="bracket" id="openBraket">(</button>
        <button class="bracket" id="closeBraket">)</button>
        <button class="sign" id="cancel">X</button>
        <button id="equl">=</button>
        <button class="sign" id="point">.</button>

    </div>
</div>

<script src="script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.1/math.js"></script>
</body>
</html>
